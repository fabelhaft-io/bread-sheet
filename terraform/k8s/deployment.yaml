apiVersion: apps/v1
kind: Deployment
metadata:
  name: bread-sheet-server
  namespace: default
  labels:
    app: bread-sheet-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bread-sheet-server
  template:
    metadata:
      labels:
        app: bread-sheet-server
    spec:
      serviceAccountName: bread-sheet-server
      # Run Prisma migrations to completion before any server container starts.
      # `db:deploy` = prisma migrate deploy && prisma generate (server/package.json).
      initContainers:
        - name: migrate
          # Public GHCR image; CI rewrites the tag to the pushed Git SHA.
          image: ghcr.io/fabelhaft-io/bread-sheet-server:latest
          command: ["npm", "run", "db:deploy"]
          envFrom:
            - secretRef:
                name: bread-sheet-server-secrets
      containers:
        - name: server
          image: ghcr.io/fabelhaft-io/bread-sheet-server:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bread-sheet-server-config
            - secretRef:
                name: bread-sheet-server-secrets
          volumeMounts:
            # Projected SA token + WIF cred config — keyless Google Cloud auth.
            - name: gcp-token
              mountPath: /var/run/secrets/gcp
              readOnly: true
            - name: gcp-wif-cred-config
              mountPath: /etc/gcp
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        # Kubernetes mints a short-lived token for the pod's ServiceAccount.
        # `audience` MUST match the WIF credential config's `audience` field
        # (//iam.googleapis.com/<gcp_wif_provider output>).
        - name: gcp-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: //iam.googleapis.com/REPLACE_WITH_gcp_wif_provider_OUTPUT
                  expirationSeconds: 3600
                  path: token
        - name: gcp-wif-cred-config
          configMap:
            name: gcp-wif-cred-config