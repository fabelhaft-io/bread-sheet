apiVersion: apps/v1
kind: Deployment
metadata:
  name: bread-sheet-server
  namespace: default
  labels:
    app: bread-sheet-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bread-sheet-server
  template:
    metadata:
      labels:
        app: bread-sheet-server
    spec:
      serviceAccountName: bread-sheet-server
      # Run Prisma migrations to completion before any server container starts.
      # `db:deploy` = prisma migrate deploy && prisma generate (server/package.json).
      initContainers:
        - name: migrate
          # CI rewrites the tag to the pushed Git SHA. Replace the repo host with
          # terraform output `ecr_repository_url`.
          image: ECR_REPOSITORY_URL:latest
          command: ["npm", "run", "db:deploy"]
          envFrom:
            - secretRef:
                name: bread-sheet-server-secrets
      containers:
        - name: server
          image: ECR_REPOSITORY_URL:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bread-sheet-server-config
            - secretRef:
                name: bread-sheet-server-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"