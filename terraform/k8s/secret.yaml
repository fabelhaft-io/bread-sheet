# TEMPLATE ONLY — DO NOT COMMIT REAL VALUES.
#
# Create this Secret out-of-band so credentials never live in git. Either:
#
#   kubectl create secret generic bread-sheet-server-secrets \
#     --namespace default \
#     --from-literal=DATABASE_URL='postgresql://breadsheet:<pw>@<rds-endpoint>:5432/breadsheet' \
#     --from-literal=SUPABASE_URL='https://<project>.supabase.co' \
#     --from-literal=SUPABASE_PUBLISHABLE_DEFAULT_KEY='<key>'
#
# No GEMINI_API_KEY: Vision/Vertex auth is keyless via Workload Identity
# Federation (see configmap.yaml + gcp-wif-credconfig.yaml).
