#
# The placeholders below document the required keys; `stringData` is shown for
# readability but a real Secret should be created via the command above.
apiVersion: v1
kind: Secret
metadata:
  name: bread-sheet-server-secrets
  namespace: default
type: Opaque
stringData:
  DATABASE_URL: "postgresql://breadsheet:REPLACE_ME@REPLACE_RDS_ENDPOINT:5432/breadsheet"
  SUPABASE_URL: "https://REPLACE_PROJECT.supabase.co"
  SUPABASE_PUBLISHABLE_DEFAULT_KEY: "REPLACE_ME"