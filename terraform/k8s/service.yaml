apiVersion: v1
kind: Service
metadata:
  name: bread-sheet-server-svc
  namespace: default
spec:
  # LoadBalancer provisions an ELB so the dev API is reachable from devices/Expo.
  # Use ClusterIP instead if fronting with an Ingress / API gateway.
  type: LoadBalancer
  selector:
    app: bread-sheet-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000