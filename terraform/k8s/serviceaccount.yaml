apiVersion: v1
kind: ServiceAccount
metadata:
  name: bread-sheet-server
  namespace: default
  annotations:
    # IRSA — replace with terraform output `server_irsa_role_arn`. Lets the pod
    # assume the IAM role granting S3 access without static AWS keys.
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/breadsheet-dev-server-irsa