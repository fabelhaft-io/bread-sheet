name: Build & push server image

# Builds server/Dockerfile and pushes to GitHub Container Registry (free).
# The package is public, so EKS pulls it with no imagePullSecret.
on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/bread-sheet-server

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          # Tag with the commit SHA (deployable, immutable) and latest.
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
