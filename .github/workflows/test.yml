name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    name: Server unit & integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Run tests
        run: npm test

  app:
    name: App unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bread-sheet-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: bread-sheet-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
