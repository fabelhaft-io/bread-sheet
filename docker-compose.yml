services:
  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=breadsheet
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d breadsheet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Server: Only starts in 'app-dev' profile
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://admin:password@db:5432/breadsheet
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=password
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566 # Points AWS SDK to LocalStack
    depends_on:
      db:
        condition: service_healthy
    # Run migrations then start dev server with hot-reloading
    command: sh -c "npm run db:deploy && npm run dev"
    volumes:
      # Mount source code for hot-reloading
      - ./server/src:/usr/src/app/src
      # Mount prisma directory to persist schema and migration changes
      - ./server/prisma:/usr/src/app/prisma
    profiles:
      - app-dev

  # LocalStack: Emulates AWS (S3, Lambda, etc.) locally
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566" # Gateway port for all services
    environment:
      - SERVICES=s3,lambda,iam,sts
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock # Required for Lambda execution
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack

volumes:
  db_data:
  localstack_data: