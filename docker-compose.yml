services:
  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=breadsheet
    volumes:
      # Postgres 18+ stores data in a version-specific subdir; mount the parent.
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d breadsheet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Server: Only starts in 'app-dev' profile
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://admin:password@db:5432/breadsheet
      # Local Postgres speaks no TLS. In prod (RDS) this is `verify-full`, which
      # verifies the server cert against the RDS CA bundle shipped in the image.
      - DB_SSL=disabled
      - DB_AUTH=password
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=password
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566 # Points AWS SDK to LocalStack
      - S3_MODE=localstack # localstack | aws — LocalStack needs path-style S3 addressing
      # Only used when VISION_MODE=live. Host credentials are mounted below.
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      # Deep link scheme for the /auth/callback redirect page.
      # Use exp+breadsheet for Expo Go, breadsheet for a production build.
      - APP_DEEP_LINK_SCHEME=exp+breadsheet
    depends_on:
      db:
        condition: service_healthy
    # Run migrations then start dev server with hot-reloading
    command: sh -c "npm run db:deploy && npm run dev"
    volumes:
      # Mount source code for hot-reloading
      - ./server/src:/usr/src/app/src
      # Mount prisma directory to persist schema and migration changes
      - ./server/prisma:/usr/src/app/prisma
      # Mount host ADC credentials for VISION_MODE=live (run 'gcloud auth application-default login' on the host first).
      # GCLOUD_ADC_PATH points at the host ADC file; set it in the root .env per-OS (Linux: ~/.config/gcloud/...,
      # Windows: %APPDATA%\gcloud\...). See .env.example.
      - ${GCLOUD_ADC_PATH}:/root/.config/gcloud/application_default_credentials.json:ro
    profiles:
      - app-dev

  # LocalStack: Emulates AWS (S3, Lambda, etc.) locally
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566" # Gateway port for all services
    environment:
      - SERVICES=s3,lambda,iam,sts,sqs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/podman.sock # Required for Lambda execution
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      # Docker
      #- "/var/run/docker.sock:/var/run/docker.sock"
      - "${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/podman.sock"
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init-buckets.sh:ro
      # image-resizer Lambda bundle — build on the host first:
      #   cd server/lambda/imageResizer && npm run build
      - ./server/lambda/imageResizer/dist/bundle:/opt/lambda/imageResizer:ro

volumes:
  db_data:
  localstack_data: